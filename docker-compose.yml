services:
  ai-tool-analytics:
    build: .
    ports:
      - "4318:4318"
    volumes:
      - ai-tool-analytics-data:/data
    environment:
      CUA_ADDR: ":4318"
      CUA_DB: "/data/ai-tool-analytics.sqlite"
      CUA_DEBUG_OTEL_KEYS: "${CUA_DEBUG_OTEL_KEYS:-}"

volumes:
  ai-tool-analytics-data:
