name: ai-usage-dashboard

services:
  ai-usage-dashboard:
    build: .
    ports:
      - "4318:4318"
    volumes:
      - ai-usage-dashboard-data:/data
    environment:
      AUD_ADDR: ":4318"
      AUD_DB: "/data/ai-usage-dashboard.sqlite"
      AUD_DEBUG_OTEL_KEYS: "${AUD_DEBUG_OTEL_KEYS:-}"

volumes:
  ai-usage-dashboard-data:
